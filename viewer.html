<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해빙 Having | 경영현황</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#A40000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="해빙 현황">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- 폰트·차트 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── 리셋 ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:#fff;
  color:#1a1a1a;
  font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  min-height:100vh;
  padding-bottom:56px;
}

/* ── 헤더 ── */
.hdr{
  background:#fff;
  padding:14px 16px 11px;
  border-bottom:2px solid #A40000;
  position:sticky;top:0;z-index:100;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ic{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-tx{font-size:14px;font-weight:800;color:#1a1a1a;line-height:1.2;letter-spacing:-.3px;}
.logo-sb{font-size:10px;color:#A40000;font-weight:600;letter-spacing:.02em;}
.ref-btn{
  background:#A40000;
  border:none;
  color:#fff;
  border-radius:9px;padding:7px 12px;
  font-size:11px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  font-family:inherit;
  transition:background .2s;
}
.ref-btn:active{background:#7a0000;}
.stamp{
  background:#FFF5F5;
  border:1px solid rgba(164,0,0,.15);
  border-radius:8px;padding:7px 11px;
  display:flex;align-items:center;justify-content:space-between;
}
.stamp-lb{font-size:10px;color:#A40000;font-weight:700;letter-spacing:.02em;}
.stamp-tm{font-size:10px;color:#888;}

/* ── 필터바 ── */
.filter-bar{
  background:#F7F4F4;
  border-bottom:1px solid #E8E0E0;
  padding:10px 16px;
  display:flex;gap:12px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none;}
.f-wrap{display:flex;flex-direction:column;gap:3px;min-width:84px;}
.f-lb{font-size:9px;color:#A40000;font-weight:700;white-space:nowrap;letter-spacing:.05em;text-transform:uppercase;}
.f-sel{
  background:#fff;
  border:1px solid #E0D0D0;
  color:#1a1a1a;
  border-radius:8px;padding:6px 7px;
  font-size:10px;font-family:inherit;
  cursor:pointer;-webkit-appearance:none;appearance:none;width:100%;
}
.f-sel:focus{outline:none;border-color:#A40000;}

/* ── 섹션 ── */
.sec{padding:12px 16px 0;}
.sec-ttl{
  font-size:10px;font-weight:800;color:#A40000;
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:10px;
  display:flex;align-items:center;gap:7px;
}
.sec-ttl::before{
  content:'';display:inline-block;
  width:3px;height:13px;border-radius:2px;
  background:var(--ac,#A40000);
}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.kc{
  background:#FFF5F5;
  border-radius:14px;padding:13px 12px;
  border-left:3px solid #A40000;
  position:relative;overflow:hidden;
}
.kc::after{content:none;}
.kc::before{content:none;}
.kc-ic{font-size:16px;margin-bottom:5px;}
.kc-lb{font-size:9px;color:#A40000;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;}
.kc-vl{font-size:22px;font-weight:900;color:#1a1a1a;line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
.kc-sb{font-size:9px;color:#888;margin-top:3px;}
.kc.wide{grid-column:1/-1;}
.rate-bg{background:rgba(164,0,0,.12);border-radius:99px;height:5px;margin:7px 0 4px;}
.rate-fg{height:5px;border-radius:99px;background:linear-gradient(90deg,#A40000,#f87171);transition:width .8s ease;}
.kc-cmp{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:6px;padding-top:5px;
  border-top:1px solid rgba(164,0,0,.15);
  font-size:10px;
}
.kc-avg-lbl{color:#888;}
.kc-up{color:#A40000;font-weight:800;}
.kc-dn{color:#D97706;font-weight:800;}

/* ── 차트 ── */
.chart-box{
  background:#FFF5F5;
  border:1px solid rgba(164,0,0,.12);
  border-radius:14px;padding:14px 13px 13px;
}
.chart-ttl{font-size:11px;font-weight:800;color:#1a1a1a;margin-bottom:3px;letter-spacing:-.2px;}
.chart-sub{font-size:9px;color:#888;margin-bottom:13px;}
.chart-canvas-wrap{position:relative;height:clamp(170px,52vw,210px);width:100%;}

/* ── 본부 테이블 ── */
.tbl-wrap{
  background:#fff;
  border:1px solid rgba(164,0,0,.12);
  border-radius:14px;overflow:hidden;
}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead tr{background:#FFF5F5;border-bottom:1px solid rgba(164,0,0,.15);}
th{padding:8px 7px;text-align:right;color:#A40000;font-weight:700;white-space:nowrap;font-size:10px;letter-spacing:.03em;}
th:first-child{text-align:left;padding-left:11px;}
tbody tr{border-bottom:1px solid #F0EAEA;}
tbody tr:last-child{border-bottom:none;}
td{padding:8px 7px;text-align:right;color:#555;font-size:11px;}
td:first-child{text-align:left;font-weight:700;color:#1a1a1a;padding-left:11px;}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:800;}
.bg{background:rgba(164,0,0,.12);color:#A40000;}
.by{background:rgba(217,119,6,.12);color:#B45309;}
.br{background:rgba(120,53,15,.12);color:#92400E;}

/* ── TOP 10 ── */
.top-wrap{
  background:#fff;
  border:1px solid rgba(164,0,0,.12);
  border-radius:14px;padding:13px 14px;
}
.top-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #F0EAEA;}
.top-item:last-child{border-bottom:none;}
.top-rank{font-size:14px;min-width:28px;text-align:center;font-weight:900;color:#CCC;}
.top-info{flex:1;}
.top-name{font-size:13px;font-weight:700;color:#1a1a1a;letter-spacing:-.2px;}
.top-branch{font-size:10px;color:#888;margin-top:1px;}
.top-val{font-size:13px;font-weight:800;color:#A40000;font-family:monospace;letter-spacing:-.3px;}
.top-note{font-size:9px;color:#888;margin-top:3px;text-align:right;}

/* ── 로딩·에러 ── */
.ctr{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
.spin{
  width:36px;height:36px;
  border:3px solid rgba(164,0,0,.15);
  border-top-color:#A40000;
  border-radius:50%;
  animation:sp .8s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg);}}
.ld-tx{font-size:13px;color:#888;}
.err-bx{
  background:#FFF5F5;
  border:1px solid rgba(164,0,0,.2);
  border-radius:13px;padding:18px;
  text-align:center;font-size:13px;color:#A40000;
  line-height:1.6;max-width:300px;
}

/* ── 구분선 ── */
.divider{
  margin:16px 16px 0;
  border:none;border-top:1px solid #F0EAEA;
}

/* ── 푸터 ── */
.footer{
  margin:18px 16px 0;padding:11px;
  background:#FFF5F5;
  border:1px solid rgba(164,0,0,.1);
  border-radius:10px;
  text-align:center;font-size:9px;color:#888;line-height:1.9;
}
</style>
</head>

      <div class="chart-sub">레드=월보험료 · 골드=인정실적 · 점선=전년동월</div>
      <div class="chart-canvas-wrap"><canvas id="ch-trend"></canvas></div>
    </div>
  </div>

  <!-- 본부별 매트릭스 -->
  <div class="sec" style="margin-top:14px;">
    <div class="sec-ttl" style="--ac:#d97706;">본부별 실적 매트릭스</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>본부</th>
          <th>월보험료</th>
          <th>가동률</th>
          <th>비중</th>
        </tr></thead>
        <tbody id="branch-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 설계사 TOP 10 -->
  <div class="sec" style="margin-top:14px;">
    <div class="sec-ttl" style="--ac:#f59e0b;">설계사 TOP 10 <span style="font-size:9px;color:#5a3a3a;font-weight:400;margin-left:4px;" id="top10-period"></span></div>
    <div class="top-wrap" id="top10"></div>
  </div>

  <div class="footer">
    ⊕ 인카금융서비스 해빙총괄사업단<br>
    본 자료는 마감 시점 기준 확정 데이터입니다
  </div>
</div>

<!-- 로딩 / 에러 -->
<div id="loading" class="ctr">
  <div class="spin"></div>
  <div class="ld-tx">데이터 불러오는 중...</div>
</div>
<div id="error" class="ctr" style="display:none;">
  <div class="err-bx" id="err-msg">오류가 발생했습니다</div>
  <button class="ref-btn" onclick="loadData()" style="margin-top:8px;">다시 시도</button>
</div>

<script>
const AS_URL = 'https://script.google.com/macros/s/AKfycbzTD7Ix4_YTZq_HNqGF0b2fhIt8f6TL3uqoSQiiudVopMoTA2rI66eoVKKtKbwwc3Ut/exec';

let RAW = { employees: [], aggregated: [], top10: [] };
let FILTERS = { branch: 'all', payMethod: 'all' };

// ── 포맷 ──
function fmtK(n) {
  n = Number(n) || 0;
  if (n >= 1e8) return (n / 1e8).toFixed(1) + '억';
  if (n >= 1e4) return Math.round(n / 1e4).toLocaleString() + '만';
  return Math.round(n).toLocaleString();
}
function fmtP(n) { return (Number(n) || 0).toFixed(1) + '%'; }
function mLabel(m) {
  m = String(m || '');
  if (m.length < 6) return m;
  return m.slice(0, 4) + '.' + m.slice(4, 6);
}

// ── 데이터 로드 ──
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('main').style.display    = 'none';
  document.getElementById('error').style.display   = 'none';
  document.getElementById('filter-bar').style.display = 'none';
  try {
    const res  = await fetch(AS_URL + '?t=' + Date.now());
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '마감 데이터 없음 — 관리자에게 문의하세요');
    if (!data.aggregated?.length) throw new Error('사전집계 데이터 없음 — 대시보드에서 클라우드 저장을 다시 실행해 주세요');

    RAW.employees  = data.employees  || [];
    RAW.aggregated = data.aggregated || [];
    RAW.top10      = data.top10      || [];

    const ts = data.lastUpdated
      ? new Date(data.lastUpdated).toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
      : '알 수 없음';
    document.getElementById('stamp-time').textContent = ts + ' 확정';

    initFilters();
    document.getElementById('loading').style.display     = 'none';
    document.getElementById('main').style.display        = 'block';
    document.getElementById('filter-bar').style.display  = 'flex';
    renderAll();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'flex';
    document.getElementById('err-msg').textContent   = '❌ ' + e.message;
  }
}

// ── 필터 초기화 ──
function initFilters() {
  const agg      = RAW.aggregated;
  const branches = [...new Set(agg.map(r => r.branch).filter(Boolean))].sort();
  const pays     = [...new Set(agg.map(r => r.payMethod).filter(Boolean))].sort();

  fillSelect('f-branch',    branches);
  fillSelect('f-paymethod', pays);

  if (pays.includes('월납')) {
    document.getElementById('f-paymethod').value = '월납';
    FILTERS.payMethod = '월납';
  }
}

function fillSelect(id, vals) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<option value="all">전체</option>' +
    vals.map(v => `<option value="${v}">${v}</option>`).join('');
  el.value = 'all';
}

// ── 필터 적용 ──
function applyFilters() {
  FILTERS.branch    = document.getElementById('f-branch').value;
  FILTERS.payMethod = document.getElementById('f-paymethod').value;
  renderAll();
}

// ── 필터된 aggregated ──
function getAgg() {
  return RAW.aggregated.filter(r => {
    if (FILTERS.branch    !== 'all' && r.branch    !== FILTERS.branch)    return false;
    if (FILTERS.payMethod !== 'all' && r.payMethod !== FILTERS.payMethod) return false;
    return true;
  });
}

// ── 납입방법 필터 제외 (활동설계사·가동률 전용) ──
function getAggAllPay() {
  return RAW.aggregated.filter(r => {
    if (FILTERS.branch !== 'all' && r.branch !== FILTERS.branch) return false;
    return true;
  });
}

// ── KPI 계산 ──
function calcKPIs() {
  const agg   = getAgg();
  const aggAP = getAggAllPay();

  const now   = new Date();
  const currM = String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0');

  const allMonths = [...new Set(RAW.aggregated.map(r => r.month).filter(Boolean))].sort();
  const latM      = allMonths[allMonths.length - 1] || '';

  const closedMonths = allMonths.filter(m => m < currM);
  const last6Closed  = closedMonths.slice(-6);
  const closedSet    = new Set(last6Closed);
  const mc           = last6Closed.length || 1;

  const regEmps = (RAW.employees || []).filter(e => (e.type || '').replace(/\s/g, '') === '재직');
  const filteredEmps = FILTERS.branch === 'all'
    ? regEmps
    : regEmps.filter(e => (e.b2 || '').trim() === FILTERS.branch);
  const kpiE = filteredEmps.length || regEmps.length;

  const latAgg   = agg.filter(r => r.month === latM);
  const latAggAP = aggAP.filter(r => r.month === latM);
  const latA  = latAgg.reduce((s, r) => s + r.premium, 0);
  const latC  = latAgg.reduce((s, r) => s + r.count, 0);
  const latD  = latAggAP.reduce((s, r) => s + r.activeAgents, 0);
  const latF  = kpiE > 0 ? latD / kpiE * 100 : 0;
  const latProd = latD > 0 ? latA / latD : 0;

  const closedAgg   = agg.filter(r => closedSet.has(r.month));
  const closedAggAP = aggAP.filter(r => closedSet.has(r.month));

  const avgA = closedAgg.reduce((s, r) => s + r.premium, 0) / mc;
  const avgC = closedAgg.reduce((s, r) => s + r.count, 0)   / mc;

  const byMonth = {};
  closedAggAP.forEach(r => {
    byMonth[r.month] = (byMonth[r.month] || 0) + r.activeAgents;
  });
  const monthActVals = Object.values(byMonth);
  const avgD = monthActVals.length > 0
    ? monthActVals.reduce((a, b) => a + b, 0) / monthActVals.length
    : latD;
  const avgF    = kpiE > 0 ? avgD / kpiE * 100 : 0;
  const avgProd = avgD > 0 ? avgA / avgD : 0;

  return { latA, latC, latD, latE: kpiE, latF, latProd, avgA, avgC, avgD, avgF, avgProd, mc, latM, closedMonths, allMonths };
}

// ── 비교 태그 ──
function cmp(lat, avg, unit) {
  if (!avg) return '';
  const p  = avg > 0 ? (lat - avg) / avg * 100 : 0;
  let fa;
  if      (unit === 'pct')    fa = fmtP(avg);
  else if (unit === 'person') fa = Math.round(avg).toLocaleString() + '명';
  else if (unit === 'cnt')    fa = Math.round(avg).toLocaleString() + '건';
  else                         fa = fmtK(avg) + '원';
  return `<div class="kc-cmp">
    <span class="kc-avg-lbl">월평균 ${fa}</span>
    <span class="${p >= 0 ? 'kc-up' : 'kc-dn'}">${p >= 0 ? '+' : ''}${p.toFixed(1)}%</span>
  </div>`;
}

// ── 전체 렌더 ──
function renderAll() {
  const kpis = calcKPIs();
  renderKPICards(kpis);
  renderTrend(kpis);
  renderBranchTable(kpis);
  renderTop10();
}

// ── KPI 카드 ──
function renderKPICards(kpis) {
  const { latA, latC, latD, latE, latF, latProd, avgA, avgC, avgD, avgF, avgProd, mc, latM } = kpis;

  document.getElementById('kpi-period').textContent =
    latM ? `(${mLabel(latM)} vs 직전 6개월 월평균)` : '';

  const rc   = latF < 50 ? '#d97706' : latF < 70 ? '#f59e0b' : '#f87171';
  const defs = [
    {
      ic: '💰', lb: '당월 월보험료',
      vl: fmtK(latA) + '원',
      sb: mLabel(latM) + ' 확정',
      cm: cmp(latA, avgA, 'money'),
      cl: '#f87171', ac: 'linear-gradient(90deg,#a40000,#9b1c1c)',
      glow: 'rgba(164,0,0,.1)'
    },
    {
      ic: '📋', lb: '당월 계약건수',
      vl: Math.round(latC).toLocaleString() + '건',
      sb: '중복제거 완료',
      cm: cmp(latC, avgC, 'cnt'),
      cl: '#fca5a5', ac: 'linear-gradient(90deg,#dc2626,#b91c1c)',
      glow: 'rgba(220,38,38,.1)'
    },
    {
      ic: '📈', lb: '당월 생산성',
      vl: fmtK(latProd) + '원',
      sb: '활동설계사 1인당',
      cm: cmp(latProd, avgProd, 'money'),
      cl: '#fbbf24', ac: 'linear-gradient(90deg,#d97706,#b45309)',
      glow: 'rgba(217,119,6,.1)'
    },
    {
      ic: '🏃', lb: '당월 활동설계사',
      vl: latD + '명',
      sb: '납입방법 무관',
      cm: cmp(latD, avgD, 'person'),
      cl: '#f59e0b', ac: 'linear-gradient(90deg,#f59e0b,#d97706)',
      glow: 'rgba(245,158,11,.1)'
    },
    {
      ic: '👥', lb: '재직 설계사',
      vl: latE + '명',
      sb: '등록구분=재직',
      cm: '',
      cl: '#fca5a5', ac: 'linear-gradient(90deg,#ef4444,#dc2626)',
      glow: 'rgba(239,68,68,.08)'
    },
    {
      ic: '⚡', lb: '당월 가동률',
      vl: fmtP(latF),
      sb: latD + '명 / ' + latE + '명',
      cm: cmp(latF, avgF, 'pct'),
      cl: rc, ac: `linear-gradient(90deg,${rc},${rc}99)`,
      glow: `rgba(164,0,0,.08)`,
      wide: true, rate: latF
    },
  ];

  document.getElementById('kpi-grid').innerHTML = defs.map(k => `
    <div class="kc${k.wide ? ' wide' : ''}" style="--ac:${k.ac};--cl:${k.cl};--glow:${k.glow};">
      <div class="kc-ic">${k.ic}</div>
      <div class="kc-lb">${k.lb}</div>
      <div class="kc-vl">${k.vl}</div>
      ${k.rate != null ? `<div class="rate-bg"><div class="rate-fg" style="width:${Math.min(k.rate, 100)}%"></div></div>` : ''}
      <div class="kc-sb">${k.sb}</div>
      ${k.cm}
    </div>`).join('');
}

// ── 월별 트렌드 ──
const _chartReg = {};
function renderTrend(kpis) {
  const agg        = getAgg();
  const allMonths  = kpis.allMonths.slice(-6);

  const monthMap = {};
  agg.forEach(r => {
    if (!monthMap[r.month]) monthMap[r.month] = { premium: 0, credit: 0 };
    monthMap[r.month].premium += r.premium;
    monthMap[r.month].credit  += r.credit;
  });

  const allAggMap = {};
  RAW.aggregated.filter(r => FILTERS.branch === 'all' || r.branch === FILTERS.branch)
    .forEach(r => { allAggMap[r.month] = (allAggMap[r.month] || 0) + r.premium; });
  const yoyData = allMonths.map(m => {
    const prevM = String(parseInt(m.slice(0, 4)) - 1) + m.slice(4, 6);
    return allAggMap[prevM] != null ? allAggMap[prevM] : null;
  });

  const labels   = allMonths.map(m => mLabel(m) + '월');
  const premData = allMonths.map(m => monthMap[m]?.premium || 0);
  const credData = allMonths.map(m => monthMap[m]?.credit  || 0);
  const hasYoY   = yoyData.some(v => v !== null);

  if (_chartReg['trend']) _chartReg['trend'].destroy();
  const ctx = document.getElementById('ch-trend');
  if (!ctx) return;
  _chartReg['trend'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { type:'bar', label:'월보험료', data:premData,
          backgroundColor:'rgba(164,0,0,.45)', borderColor:'#a40000',
          borderWidth:1, borderRadius:4, yAxisID:'y' },
        { type:'bar', label:'인정실적', data:credData,
          backgroundColor:'rgba(217,119,6,.4)', borderColor:'#d97706',
          borderWidth:1, borderRadius:4, yAxisID:'y' },
        ...(hasYoY ? [{ type:'line', label:'전년동월', data:yoyData,
          borderColor:'#fbbf24', borderDash:[5,4], borderWidth:1.5,
          pointRadius:3, pointBackgroundColor:'#fbbf24',
          spanGaps:false, fill:false, tension:.15, yAxisID:'y' }] : []),
      ],
    },
    options: {
      responsive:true, maintainAspectRatio:false, animation:{duration:500},
      plugins:{
        legend:{
          display:true,
          labels:{ color:'#888', font:{size:9}, boxWidth:10, padding:12 }
        },
      },
      scales:{
        x:{ grid:{color:'rgba(0,0,0,.06)'}, ticks:{color:'#999', font:{size:10}} },
        y:{ type:'linear', position:'left', grid:{color:'rgba(0,0,0,.06)'},
          ticks:{ color:'#999', font:{size:9}, callback:v=>{
            if(v===0) return '0';
            const a=Math.abs(v);
            if(a>=100000000) return (v/100000000).toFixed(1).replace(/\.0$/,'')+'억';
            if(a>=10000000)  return (v/10000000).toFixed(0)+'천만';
            if(a>=1000000)   return (v/1000000).toFixed(0)+'백만';
            return (v/10000).toFixed(0)+'만';
          }}
        },
      },
    },
  });
}

// ── 본부별 매트릭스 ──
function renderBranchTable(kpis) {
  const agg   = getAgg();
  const aggAP = getAggAllPay();
  const { latM, mc } = kpis;

  const bMap = {};
  agg.forEach(r => {
    const b = r.branch || '미분류';
    if (!bMap[b]) bMap[b] = { premium: 0, credit: 0 };
    bMap[b].premium += r.premium;
    bMap[b].credit  += r.credit;
  });

  const latActive = {};
  aggAP.filter(r => r.month === latM).forEach(r => {
    const b = r.branch || '미분류';
    latActive[b] = (latActive[b] || 0) + r.activeAgents;
  });

  const regEmps = (RAW.employees || []).filter(e => (e.type || '').replace(/\s/g, '') === '재직');
  const branchReg = {};
  regEmps.forEach(e => {
    const b = (e.b2 || '').trim() || '미분류';
    branchReg[b] = (branchReg[b] || 0) + 1;
  });

  const totalPrem = Object.values(bMap).reduce((s, v) => s + v.premium, 0) || 1;

  const rows = Object.entries(bMap)
    .filter(([k]) => k && k !== '미분류')
    .map(([name, v]) => {
      const reg     = FILTERS.branch !== 'all' ? kpis.latE : (branchReg[name] || 0);
      const act     = latActive[name] || 0;
      const actRate = reg > 0 ? act / reg * 100 : 0;
      const share   = v.premium / totalPrem * 100;
      const avgCr   = v.credit / mc;
      return { name, premium: v.premium, actRate, share, avgCr };
    })
    .filter(b => b.premium > 0)
    .sort((a, b) => b.premium - a.premium);

  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('branch-tbody').innerHTML = rows.map((b, i) => `
    <tr>
      <td>${medals[i] || (i + 1)} ${b.name}</td>
      <td style="color:#A40000;font-family:monospace;">${fmtK(b.avgCr)}원<br>
        <span style="font-size:9px;color:#5a3a3a;">월평균</span></td>
      <td><span class="badge ${b.actRate < 50 ? 'br' : b.actRate < 70 ? 'by' : 'bg'}">${fmtP(b.actRate)}</span></td>
      <td style="color:#888">${fmtP(b.share)}</td>
    </tr>`).join('');
}

// ── TOP 10 ──
function renderTop10() {
  const top10 = RAW.top10 || [];
  const n     = top10[0]?.months || 6;
  document.getElementById('top10-period').textContent = `(직전 ${n}개월 월평균 · 필터 무관)`;

  if (!top10.length) {
    document.getElementById('top10').innerHTML =
      '<div style="color:#888;text-align:center;padding:16px;font-size:12px;">데이터 없음</div>';
    return;
  }

  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('top10').innerHTML = top10.map((a, i) => `
    <div class="top-item">
      <div class="top-rank">${medals[i] || (i + 1) + '위'}</div>
      <div class="top-info">
        <div class="top-name">${a.name || '알 수 없음'}</div>
        <div class="top-branch">${a.branch || ''}</div>
      </div>
      <div>
        <div class="top-val">${fmtK(a.avgPremium)}원</div>
        <div class="top-note">월평균</div>
      </div>
    </div>`).join('');
}

loadData();

// ── Service Worker 등록 ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/inca-dashboard/sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.warn('SW failed:', e));
  });
}
</script>
