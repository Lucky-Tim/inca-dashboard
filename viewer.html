<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인카금융 해빙총괄 | 경영현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#050d1a;color:#e2e8f0;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:48px;}

/* ── 헤더 ── */
.hdr{background:linear-gradient(135deg,#0f172a,#1e1b4b);padding:14px 14px 10px;border-bottom:1px solid rgba(99,102,241,.25);position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-tx{font-size:13px;font-weight:800;color:#e2e8f0;line-height:1.25;}
.logo-sb{font-size:10px;color:#64748b;}
.ref-btn{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;}
.stamp{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;}
.stamp-lb{font-size:10px;color:#34d399;font-weight:700;}
.stamp-tm{font-size:10px;color:#94a3b8;}

/* ── 필터바 ── */
.filter-bar{background:#0a1628;border-bottom:1px solid #1e293b;padding:10px 14px;display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.f-wrap{display:flex;flex-direction:column;gap:3px;min-width:72px;}
.f-lb{font-size:9px;color:#475569;font-weight:700;white-space:nowrap;}
.f-sel{background:#0f172a;border:1px solid #1e293b;color:#cbd5e1;border-radius:7px;padding:5px 6px;font-size:10px;font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%;}
.f-sel:focus{outline:none;border-color:#6366f1;}

/* ── 기간단위 토글 ── */
.period-row{display:flex;align-items:center;gap:8px;padding:10px 14px 0;}
.period-lb{font-size:10px;color:#64748b;font-weight:700;}
.p-btn{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:800;cursor:pointer;border:1px solid rgba(100,116,139,.3);background:transparent;color:#64748b;transition:all .2s;}
.p-btn.active-total{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.5);color:#93c5fd;}
.p-btn.active-monthly{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.5);color:#6ee7b7;}
.p-btn.active-compare{background:rgba(251,146,60,.2);border-color:rgba(251,146,60,.5);color:#fdba74;}
.period-cnt{font-size:10px;color:#64748b;}
.kc-cmp{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;}
.kc-avg-lbl{color:#64748b;}
.kc-up{color:#4ade80;font-weight:800;}
.kc-dn{color:#f87171;font-weight:800;}

/* ── 섹션 ── */
.sec{padding:12px 14px 0;}
.sec-ttl{font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.sec-ttl::before{content:'';display:inline-block;width:3px;height:12px;border-radius:2px;background:var(--ac,#6366f1);}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kc{background:linear-gradient(135deg,rgba(15,23,42,.9),rgba(30,27,75,.5));border-radius:13px;padding:13px 11px;border:1px solid rgba(99,102,241,.1);position:relative;overflow:hidden;}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,linear-gradient(90deg,#6366f1,#8b5cf6));}
.kc-ic{font-size:15px;margin-bottom:5px;}
.kc-lb{font-size:9px;color:#64748b;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em;}
.kc-vl{font-size:19px;font-weight:900;color:var(--cl,#818cf8);line-height:1.1;font-variant-numeric:tabular-nums;}
.kc-sb{font-size:9px;color:#475569;margin-top:3px;}
.kc.wide{grid-column:1/-1;}
.rate-bg{background:rgba(255,255,255,.06);border-radius:99px;height:6px;margin:7px 0 4px;}
.rate-fg{height:6px;border-radius:99px;background:linear-gradient(90deg,#22c55e,#4ade80);transition:width .7s ease;}

/* ── 차트 ── */
.chart-box{background:rgba(15,23,42,.7);border:1px solid rgba(51,65,85,.5);border-radius:13px;padding:13px;}
canvas{max-height:210px;}

/* ── 본부 테이블 ── */
.tbl-wrap{background:rgba(15,23,42,.7);border:1px solid rgba(51,65,85,.5);border-radius:13px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead tr{background:#0f172a;border-bottom:1px solid #1e293b;}
th{padding:7px 7px;text-align:right;color:#64748b;font-weight:700;white-space:nowrap;font-size:10px;}
th:first-child{text-align:left;padding-left:10px;}
tbody tr{border-bottom:1px solid rgba(30,41,59,.8);}
td{padding:7px 7px;text-align:right;color:#cbd5e1;font-size:11px;}
td:first-child{text-align:left;font-weight:700;color:#e2e8f0;padding-left:10px;}
.badge{display:inline-block;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:800;}
.bg{background:rgba(34,197,94,.15);color:#4ade80;}
.by{background:rgba(234,179,8,.15);color:#fbbf24;}
.br{background:rgba(239,68,68,.15);color:#f87171;}

/* ── 납입방법 ── */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pay-c{background:rgba(15,23,42,.8);border:1px solid rgba(51,65,85,.5);border-radius:11px;padding:11px;}
.pay-lb{font-size:10px;color:#64748b;margin-bottom:3px;}
.pay-vl{font-size:14px;font-weight:800;color:#e2e8f0;}
.pay-sb{font-size:9px;color:#475569;margin-top:2px;}

/* ── TOP 5 ── */
.top5-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1e293b;}
.top5-item:last-child{border-bottom:none;}
.top5-rank{font-size:16px;min-width:26px;text-align:center;}
.top5-info{flex:1;}
.top5-name{font-size:13px;font-weight:700;color:#e2e8f0;}
.top5-branch{font-size:10px;color:#64748b;margin-top:1px;}
.top5-val{font-size:13px;font-weight:800;color:#60a5fa;font-family:monospace;}

/* ── 로딩/에러 ── */
.ctr{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
.spin{width:36px;height:36px;border:3px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.ld-tx{font-size:13px;color:#64748b;}
.err-bx{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:13px;padding:18px;text-align:center;font-size:13px;color:#f87171;line-height:1.6;max-width:300px;}

/* ── 푸터 ── */
.footer{margin:18px 14px 0;padding:10px;background:rgba(15,23,42,.5);border-radius:9px;text-align:center;font-size:9px;color:#334155;line-height:1.8;}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-ic">🏢</div>
      <div>
        <div class="logo-tx">인카금융 해빙총괄</div>
        <div class="logo-sb">조직 운영 경영현황</div>
      </div>
    </div>
    <button class="ref-btn" onclick="loadData()">🔄 갱신</button>
  </div>
  <div class="stamp">
    <span class="stamp-lb">📌 마감 기준</span>
    <span class="stamp-tm" id="stamp-time">불러오는 중...</span>
  </div>
</div>

<!-- 필터바 -->
<div class="filter-bar" id="filter-bar" style="display:none;">
  <div class="f-wrap">
    <div class="f-lb">납입연도</div>
    <select class="f-sel" id="f-year" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
  <div class="f-wrap">
    <div class="f-lb">납입월</div>
    <select class="f-sel" id="f-month" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
  <div class="f-wrap" style="min-width:88px;">
    <div class="f-lb">소속본부</div>
    <select class="f-sel" id="f-branch" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
  <div class="f-wrap" style="min-width:80px;">
    <div class="f-lb">보험종목</div>
    <select class="f-sel" id="f-category" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
  <div class="f-wrap" style="min-width:80px;">
    <div class="f-lb">보험회사</div>
    <select class="f-sel" id="f-company" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
  <div class="f-wrap" style="min-width:72px;">
    <div class="f-lb">납입방법</div>
    <select class="f-sel" id="f-paymethod" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
</div>

<!-- 기간단위 토글 -->
<div class="period-row" id="period-row" style="display:none;">
  <span class="period-lb">기간 단위:</span>
  <button id="btn-total"   class="p-btn"                onclick="setPeriod('total')">연간 합계</button>
  <button id="btn-monthly" class="p-btn active-monthly" onclick="setPeriod('monthly')">월평균</button>
  <button id="btn-compare" class="p-btn"                onclick="setPeriod('compare')">당월 비교</button>
  <span class="period-cnt" id="period-cnt"></span>
</div>

<!-- 메인 -->
<div id="main" style="display:none;">

  <!-- KPI -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#6366f1;">핵심 KPI</div>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>

  <!-- 월별 트렌드 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#8b5cf6;">월별 실적 추이</div>
    <div class="chart-box">
      <canvas id="ch-trend"></canvas>
    </div>
  </div>

  <!-- 보험종목 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#f59e0b;">보험종목 구성</div>
    <div class="chart-box" style="display:flex;align-items:center;justify-content:center;">
      <canvas id="ch-cat" style="max-height:190px;max-width:190px;"></canvas>
    </div>
  </div>

  <!-- 본부별 매트릭스 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#10b981;">본부별 실적 매트릭스</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>본부</th>
          <th id="th-credit">인정실적</th>
          <th>가동률</th>
          <th id="th-growth">성장률</th>
          <th>비중</th>
        </tr></thead>
        <tbody id="branch-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 설계사 TOP 5 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#f59e0b;">설계사 실적 TOP 5</div>
    <div style="background:rgba(15,23,42,.7);border:1px solid rgba(51,65,85,.5);border-radius:13px;padding:13px;">
      <div id="top5"></div>
    </div>
  </div>

  <!-- 납입방법 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#06b6d4;">납입방법별 실적</div>
    <div class="pay-grid" id="pay-grid"></div>
  </div>

  <div class="footer">
    인카금융서비스 해빙총괄사업단<br>
    본 자료는 마감 시점 기준 확정 데이터입니다
  </div>
</div>

<div id="loading" class="ctr">
  <div class="spin"></div>
  <div class="ld-tx">데이터 불러오는 중...</div>
</div>
<div id="error" class="ctr" style="display:none;">
  <div class="err-bx" id="err-msg">오류가 발생했습니다</div>
  <button class="ref-btn" onclick="loadData()" style="margin-top:8px;">다시 시도</button>
</div>

<script>
const AS_URL = 'https://script.google.com/macros/s/AKfycbzTD7Ix4_YTZq_HNqGF0b2fhIt8f6TL3uqoSQiiudVopMoTA2rI66eoVKKtKbwwc3Ut/exec';
const COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#84cc16'];
const chartReg = {};

let RAW = { employees:[], performance:[] };
let FILTERS = { year:'all', month:'all', branch:'all', category:'all', company:'all', payMethod:'all' };
let periodMode = 'monthly';

// ── 포맷 ──
function fmtK(n){
  if(n>=1e8) return (n/1e8).toFixed(1)+'억';
  if(n>=1e4) return Math.round(n/1e4).toLocaleString()+'만';
  return Math.round(n).toLocaleString();
}
function fmtP(n){ return (n||0).toFixed(1)+'%'; }
function mLabel(m){
  m=String(m||'');
  if(m.length<6) return m;
  return m.slice(0,4)+'년 '+m.slice(4,6)+'월';
}

// ── 데이터 로드 ──
async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('main').style.display='none';
  document.getElementById('error').style.display='none';
  document.getElementById('filter-bar').style.display='none';
  document.getElementById('period-row').style.display='none';
  try{
    const res  = await fetch(AS_URL+'?t='+Date.now());
    const data = await res.json();
    if(!data.ok||!data.employees?.length) throw new Error(data.error||'마감 데이터 없음 — 관리자에게 문의하세요');
    data.performance = (data.performance||[]).map(r=>({...r, month:String(r.month||'').trim()}));
    RAW.employees    = data.employees||[];
    RAW.performance  = data.performance||[];

    const ts = data.lastUpdated
      ? new Date(data.lastUpdated).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '알 수 없음';
    document.getElementById('stamp-time').textContent = ts+' 확정';

    initFilters();
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
    document.getElementById('filter-bar').style.display='flex';
    document.getElementById('period-row').style.display='flex';
    renderAll();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='flex';
    document.getElementById('err-msg').textContent='❌ '+e.message;
  }
}

// ── 필터 초기화 ──
function initFilters(){
  const perfs = RAW.performance;
  const emps  = RAW.employees;
  const years    = [...new Set(perfs.map(r=>String(r.month||'').slice(0,4)).filter(Boolean))].sort();
  const months   = [...new Set(perfs.map(r=>String(r.month||'').slice(4,6)).filter(Boolean))].sort();
  const branches = [...new Set(perfs.map(r=>{
    const e=emps.find(emp=>String(emp.id)===String(r.agentId));
    return (r.branch2||(e?.b2)||'').trim();
  }).filter(Boolean))].sort();
  const cats     = [...new Set(perfs.map(r=>(r.category||'').trim()).filter(Boolean))].sort();
  const companies= [...new Set(perfs.map(r=>(r.company||'').trim()).filter(Boolean))].sort();
  const pays     = [...new Set(perfs.map(r=>(r.payMethod||'').trim()).filter(Boolean))].sort();

  fillSelect('f-year',     years,    v=>v+'년');
  fillSelect('f-month',    months,   v=>v+'월');
  fillSelect('f-branch',   branches);
  fillSelect('f-category', cats);
  fillSelect('f-company',  companies);
  fillSelect('f-paymethod',pays);

  // ── 기본값: 데이터 마지막 년/월, 납입방법 월납 ──
  const allM=[...new Set(perfs.map(r=>String(r.month||'').trim()).filter(Boolean))].sort();
  const latFull=allM[allM.length-1]||'';
  const defY=latFull.slice(0,4), defM=latFull.slice(4,6);
  if(defY) document.getElementById('f-year').value=defY;
  if(defM) document.getElementById('f-month').value=defM;
  if(pays.includes('월납')) document.getElementById('f-paymethod').value='월납';

  // FILTERS 객체 동기화
  FILTERS.year     =document.getElementById('f-year').value;
  FILTERS.month    =document.getElementById('f-month').value;
  FILTERS.payMethod=document.getElementById('f-paymethod').value;
}

function fillSelect(id, vals, label=(v=>v)){
  const el=document.getElementById(id);
  if(!el) return;
  el.innerHTML='<option value="all">전체</option>'+vals.map(v=>`<option value="${v}">${label(v)}</option>`).join('');
  el.value='all';
}

// ── 필터 적용 ──
function applyFilters(){
  FILTERS.year     = document.getElementById('f-year').value;
  FILTERS.month    = document.getElementById('f-month').value;
  FILTERS.branch   = document.getElementById('f-branch').value;
  FILTERS.category = document.getElementById('f-category').value;
  FILTERS.company  = document.getElementById('f-company').value;
  FILTERS.payMethod= document.getElementById('f-paymethod').value;
  renderAll();
}

// ── 필터된 실적 ──
function getFiltered(){
  const emps = RAW.employees;
  return RAW.performance.filter(r=>{
    const m=String(r.month||'');
    if(FILTERS.year!=='all'     && m.slice(0,4)!==FILTERS.year)                        return false;
    if(FILTERS.month!=='all'    && m.slice(4,6)!==FILTERS.month)                       return false;
    if(FILTERS.category!=='all' && (r.category||'').trim()!==FILTERS.category)         return false;
    if(FILTERS.company!=='all'  && (r.company||'').trim()!==FILTERS.company)           return false;
    if(FILTERS.payMethod!=='all'&& (r.payMethod||'').trim()!==FILTERS.payMethod)       return false;
    if(FILTERS.branch!=='all'){
      const e=emps.find(emp=>String(emp.id)===String(r.agentId));
      const b=(r.branch2||(e?.b2)||'').trim();
      if(b!==FILTERS.branch) return false;
    }
    return true;
  });
}

// ── 기간 모드 ──
function setPeriod(mode){
  periodMode=mode;
  document.getElementById('btn-total').className   ='p-btn'+(mode==='total'  ?' active-total':'');
  document.getElementById('btn-monthly').className ='p-btn'+(mode==='monthly'?' active-monthly':'');
  document.getElementById('btn-compare').className ='p-btn'+(mode==='compare'?' active-compare':'');
  renderAll();
}

// ── KPI 계산 ──
function calcKPIs(emps, perfs){
  const regjEmps=emps.filter(e=>(e.type||'').replace(/\s/g,'')==='재직');
  const regIdSet=new Set(regjEmps.map(e=>String(e.id)));
  const kpiA=perfs.reduce((s,r)=>s+(Number(r.premium)||0),0);
  const kpiB=perfs.reduce((s,r)=>s+(Number(r.credit)||0),0);
  const kpiC=new Set(perfs.map(r=>r.SUNAB_PK||r['증권번호']).filter(Boolean)).size;
  const activeSet=new Set(perfs.filter(r=>(Number(r.premium)||0)>0&&regIdSet.has(String(r.agentId))).map(r=>r.agentId));
  const kpiD=activeSet.size;
  const kpiE=regjEmps.length||emps.length;
  const kpiF=kpiE>0?(kpiD/kpiE*100):0;
  const kpiG=kpiD>0?kpiA/kpiD:0;
  const months=[...new Set(perfs.map(r=>r.month).filter(Boolean))].sort();
  const latM=months[months.length-1], prvM=months[months.length-2];
  const latSum=perfs.filter(r=>r.month===latM).reduce((s,r)=>s+(Number(r.premium)||0),0);
  const prvSum=perfs.filter(r=>r.month===prvM).reduce((s,r)=>s+(Number(r.premium)||0),0);
  const kpiK=prvSum>0?((latSum-prvSum)/prvSum*100):0;
  return {A:kpiA,B:kpiB,C:kpiC,D:kpiD,E:kpiE,F:kpiF,G:kpiG,K:kpiK,months,latM,prvM,monthCount:months.length||1};
}

// ── 본부 통계 ──
function getBranchStats(emps, perfs, kpis){
  const {latM,prvM}=kpis;
  const map={};
  perfs.forEach(r=>{
    const emp=emps.find(e=>String(e.id)===String(r.agentId));
    const b=(r.branch2||(emp?.b2)||'미분류').trim();
    if(!map[b]) map[b]={premium:0,credit:0,latP:0,prvP:0};
    map[b].premium+=Number(r.premium)||0;
    map[b].credit +=Number(r.credit)||0;
    if(r.month===latM) map[b].latP+=Number(r.premium)||0;
    if(r.month===prvM) map[b].prvP+=Number(r.premium)||0;
  });
  const totalPrem=Object.values(map).reduce((s,v)=>s+v.premium,0)||1;
  const regjEmps=emps.filter(e=>(e.type||'').replace(/\s/g,'')==='재직');
  return Object.entries(map)
    .filter(([k])=>k&&k!=='미분류')
    .map(([name,v])=>{
      const branchEmps=regjEmps.filter(e=>(e.b2||'').trim()===name);
      const empCnt=branchEmps.length||1;
      const activeIds=new Set(branchEmps.map(e=>String(e.id)));
      const activeAgents=new Set(perfs.filter(r=>(Number(r.premium)||0)>0&&activeIds.has(String(r.agentId))).map(r=>r.agentId));
      const actRate=empCnt>0?(activeAgents.size/empCnt*100):0;
      const growthRate=v.prvP>0?((v.latP-v.prvP)/v.prvP*100):0;
      const share=v.premium/totalPrem*100;
      return {name,premium:v.premium,credit:v.credit,actRate,growthRate,share};
    })
    .filter(b=>b.premium>0)
    .sort((a,b)=>b.premium-a.premium);
}

// ── 차트 ──
function makeChart(id, type, data, opts={}){
  if(chartReg[id]){ chartReg[id].destroy(); }
  const ctx=document.getElementById(id);
  if(!ctx) return;
  chartReg[id]=new Chart(ctx,{type,data,options:{responsive:true,maintainAspectRatio:true,animation:{duration:500},...opts}});
}

// ── 전체 렌더 ──
function renderAll(){
  const emps =RAW.employees;
  const perfs=getFiltered();
  const kpis =calcKPIs(emps,perfs);
  const mc   =kpis.monthCount;
  const isM  =periodMode==='monthly';
  const isC  =periodMode==='compare';
  const div  =v=>isM?v/mc:v;

  // ── 당월 데이터 (compare 모드) ──
  const latM =kpis.latM;
  const latP =perfs.filter(r=>r.month===latM);
  const regjE=emps.filter(e=>(e.type||'').replace(/\s/g,'')==='재직');
  const regId=new Set(regjE.map(e=>String(e.id)));
  const latA =latP.reduce((s,r)=>s+(Number(r.premium)||0),0);
  const latB =latP.reduce((s,r)=>s+(Number(r.credit)||0),0);
  const latC =new Set(latP.map(r=>r.SUNAB_PK||r['증권번호']).filter(Boolean)).size;
  const latAct=new Set(latP.filter(r=>(Number(r.premium)||0)>0&&regId.has(String(r.agentId))).map(r=>r.agentId));
  const latD =latAct.size;
  const latF =kpis.E>0?latD/kpis.E*100:0;
  const avgA =mc>0?kpis.A/mc:0;
  const avgB =mc>0?kpis.B/mc:0;

  // 비교 HTML 헬퍼
  function cmp(lat,avg){
    if(!isC||!avg) return '';
    const p=avg>0?(lat-avg)/avg*100:0;
    return `<div class="kc-cmp"><span class="kc-avg-lbl">월평균 ${fmtK(avg)}</span><span class="${p>=0?'kc-up':'kc-dn'}">${p>=0?'+':''}${p.toFixed(1)}%</span></div>`;
  }

  document.getElementById('period-cnt').textContent=
    isC?`(${mLabel(latM)} vs 월평균)`:isM?`(${mc}개월 기준)`:'';

  // ── KPI 카드 ──
  const rc=kpis.F<50?'#ef4444':kpis.F<70?'#fbbf24':'#4ade80';
  const gc=kpis.K>=0?'#4ade80':'#f87171';
  const lrc=latF<50?'#ef4444':latF<70?'#fbbf24':'#4ade80';
  const kpiDefs=[
    {lb:isC?'당월 월보험료':isM?'월평균 월보험료':'총 월보험료',
     vl:fmtK(isC?latA:div(kpis.A))+'원',
     sb:isC?`${mLabel(latM)} 확정`:isM?`${mc}개월 평균`:'연간 합계',
     cm:cmp(latA,avgA), ic:'💰',cl:'#818cf8',ac:'linear-gradient(90deg,#6366f1,#8b5cf6)'},
    {lb:isC?'당월 인정실적':isM?'월평균 인정실적':'총 인정실적',
     vl:fmtK(isC?latB:div(kpis.B))+'원',
     sb:isC?`당월 계약 ${latC}건`:isM?`월평균 계약 ${Math.round(kpis.C/mc)}건`:'누적 인정실적',
     cm:cmp(latB,avgB), ic:'💵',cl:'#a78bfa',ac:'linear-gradient(90deg,#8b5cf6,#7c3aed)'},
    {lb:isC?'당월 계약건수':isM?'월평균 계약건수':'총 계약건수',
     vl:Math.round(isC?latC:isM?kpis.C/mc:kpis.C).toLocaleString()+'건',
     sb:'중복제거 완료',
     cm:cmp(latC,kpis.C/mc), ic:'📋',cl:'#22d3ee',ac:'linear-gradient(90deg,#06b6d4,#0891b2)'},
    {lb:isC?'당월 생산성':isM?'월평균 생산성':'설계사 생산성',
     vl:fmtK(isC?latA/(latD||1):isM?kpis.A/mc/(kpis.D||1):kpis.G)+'원',
     sb:'활동설계사 1인당',
     cm:cmp(latA/(latD||1),avgA/(kpis.D||1)), ic:'📈',cl:'#34d399',ac:'linear-gradient(90deg,#10b981,#059669)'},
    {lb:'재직 설계사',vl:kpis.E+'명',sb:'등록구분=재직 기준',cm:'',
     ic:'👥',cl:'#fbbf24',ac:'linear-gradient(90deg,#f59e0b,#d97706)'},
    {lb:isC?'당월 활동설계사':'활동 설계사',
     vl:(isC?latD:kpis.D)+'명',
     sb:isC?`당월 가동률 ${fmtP(latF)}`:`가동률 ${fmtP(kpis.F)}`,
     cm:cmp(latD,kpis.D/mc), ic:'🏃',cl:'#4ade80',ac:'linear-gradient(90deg,#22c55e,#16a34a)'},
    {lb:isC?'당월 가동률':'가동률(KPI-F)',
     vl:fmtP(isC?latF:kpis.F),
     sb:`${isC?latD:kpis.D}명 / ${kpis.E}명`,
     ic:'⚡',cl:isC?lrc:rc,ac:'linear-gradient(90deg,'+(isC?lrc:rc)+','+(isC?lrc:rc)+'88)',
     wide:true,rate:isC?latF:kpis.F,
     cm:cmp(latF,kpis.F)},
    {lb:'전월 대비 성장',vl:(kpis.K>=0?'+':'')+fmtP(kpis.K),sb:'최신월 vs 전월',cm:'',
     ic:'📊',cl:gc,ac:'linear-gradient(90deg,'+gc+','+gc+'88)'},
  ];
  document.getElementById('kpi-grid').innerHTML=kpiDefs.map(k=>`
    <div class="kc${k.wide?' wide':''}" style="--ac:${k.ac};--cl:${k.cl};">
      <div class="kc-ic">${k.ic}</div>
      <div class="kc-lb">${k.lb}</div>
      <div class="kc-vl">${k.vl}</div>
      ${k.rate!=null?`<div class="rate-bg"><div class="rate-fg" style="width:${Math.min(k.rate,100)}%"></div></div>`:''}
      <div class="kc-sb">${k.sb}</div>
      ${k.cm}
    </div>`).join('');

  // ── 트렌드 차트 ──
  const tMonths=[...new Set(perfs.map(r=>r.month).filter(Boolean))].sort();
  const tMap={};
  perfs.forEach(r=>{
    if(!tMap[r.month]) tMap[r.month]={premium:0,credit:0};
    tMap[r.month].premium+=Number(r.premium)||0;
    tMap[r.month].credit +=Number(r.credit)||0;
  });
  const tDatasets=[
    {type:'bar',label:'월보험료',data:tMonths.map(m=>tMap[m]?.premium||0),backgroundColor:'rgba(99,102,241,.4)',borderColor:'#6366f1',borderWidth:1,borderRadius:4},
    {type:'bar',label:'인정실적',data:tMonths.map(m=>tMap[m]?.credit||0), backgroundColor:'rgba(16,185,129,.35)',borderColor:'#10b981',borderWidth:1,borderRadius:4},
  ];
  if(isC&&avgA>0) tDatasets.push({type:'line',label:`월평균 ${fmtK(avgA)}`,data:tMonths.map(()=>avgA),borderColor:'#f59e0b',borderWidth:2,borderDash:[5,3],pointRadius:0,fill:false,tension:0});
  makeChart('ch-trend','bar',{labels:tMonths.map(mLabel),datasets:tDatasets},{
    plugins:{legend:{display:true,labels:{color:'#94a3b8',font:{size:9}}}},
    scales:{
      x:{grid:{color:'#1e293b'},ticks:{color:'#94a3b8',font:{size:9}}},
      y:{grid:{color:'#1e293b'},ticks:{color:'#94a3b8',font:{size:9},callback:v=>fmtK(v)}}
    }
  });

  // ── 보험종목 도넛 ──
  const catMap={};
  perfs.forEach(r=>{const c=r.category||'기타';catMap[c]=(catMap[c]||0)+(Number(r.premium)||0);});
  const catE=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  makeChart('ch-cat','doughnut',{
    labels:catE.map(([k])=>k),
    datasets:[{data:catE.map(([,v])=>v),backgroundColor:COLORS.slice(0,catE.length),borderColor:'#070c16',borderWidth:3}]
  },{
    plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10},boxWidth:10}}},
    cutout:'60%'
  });

  // ── 본부 매트릭스 ──
  const thCredit=document.getElementById('th-credit');
  const thGrowth=document.getElementById('th-growth');
  if(thCredit) thCredit.textContent=isC?'당월 인정실적':isM?'월평균 인정실적':'인정실적';
  if(thGrowth) thGrowth.textContent=isC?'vs 월평균':'성장률';
  const bStats=getBranchStats(emps,perfs,kpis).slice(0,10);
  const latBrC={};
  if(isC) latP.forEach(r=>{
    const e=emps.find(x=>String(x.id)===String(r.agentId));
    const b=(r.branch2||(e?.b2)||'미분류').trim();
    latBrC[b]=(latBrC[b]||0)+(Number(r.credit)||0);
  });
  document.getElementById('branch-tbody').innerHTML=bStats.map((b,i)=>{
    const cv=isC?(latBrC[b.name]||0):div(b.credit);
    const avgCr=b.credit/mc;
    const g4=isC?(()=>{
      const p=avgCr>0?((latBrC[b.name]||0)-avgCr)/avgCr*100:0;
      return `<td style="color:${p>=0?'#4ade80':'#f87171'}">${p>=0?'+':''}${fmtP(p)}</td>`;
    })():`<td style="color:${b.growthRate>=0?'#4ade80':'#f87171'}">${b.growthRate>=0?'+':''}${fmtP(b.growthRate)}</td>`;
    return `<tr>
      <td>${['🥇','🥈','🥉'][i]||`${i+1}`} ${b.name}</td>
      <td style="color:#60a5fa;font-family:monospace;">${fmtK(cv)}${isC?`<br><span style="font-size:9px;color:#64748b">월평균 ${fmtK(avgCr)}</span>`:''}</td>
      <td><span class="badge ${b.actRate<50?'br':b.actRate<70?'by':'bg'}">${fmtP(b.actRate)}</span></td>
      ${g4}
      <td style="color:#94a3b8;">${fmtP(b.share)}</td>
    </tr>`;
  }).join('');

  // ── TOP 5 ──
  const latAg={};
  if(isC) latP.forEach(r=>{if(!r.agentId) return;latAg[r.agentId]=(latAg[r.agentId]||0)+(Number(r.premium)||0);});
  const agMap={};
  perfs.forEach(r=>{
    if(!r.agentId) return;
    if(!agMap[r.agentId]){
      const e=emps.find(x=>String(x.id)===String(r.agentId));
      agMap[r.agentId]={name:r.agentName||(e?.name)||'알수없음',b2:(r.branch2||(e?.b2)||''),premium:0};
    }
    agMap[r.agentId].premium+=Number(r.premium)||0;
  });
  let top5;
  if(isC){
    top5=Object.entries(latAg).sort((a,b)=>b[1]-a[1]).slice(0,5)
      .map(([id,lp])=>({...(agMap[id]||{}),dp:lp,sub:`월평균 ${fmtK((agMap[id]?.premium||0)/mc)}원`}));
  } else {
    top5=Object.values(agMap).sort((a,b)=>b.premium-a.premium).slice(0,5)
      .map(a=>({...a,dp:div(a.premium),sub:''}));
  }
  document.getElementById('top5').innerHTML=top5.map((a,i)=>`
    <div class="top5-item">
      <div class="top5-rank">${['🥇','🥈','🥉','4위','5위'][i]}</div>
      <div class="top5-info">
        <div class="top5-name">${a.name||'알수없음'}</div>
        <div class="top5-branch">${a.b2||''}${a.sub?` · ${a.sub}`:''}</div>
      </div>
      <div class="top5-val">${fmtK(a.dp||0)}원</div>
    </div>`).join('');

  // ── 납입방법 ──
  const payMap={};
  perfs.forEach(r=>{
    const p=r.payMethod||'기타';
    if(!payMap[p]) payMap[p]={premium:0,cnt:0};
    payMap[p].premium+=Number(r.premium)||0; payMap[p].cnt++;
  });
  const payE=Object.entries(payMap).sort((a,b)=>b[1].premium-a[1].premium);
  document.getElementById('pay-grid').innerHTML=payE.slice(0,4).map(([nm,v])=>`
    <div class="pay-c">
      <div class="pay-lb">${nm}</div>
      <div class="pay-vl">${fmtK(isC?latP.filter(r=>r.payMethod===nm).reduce((s,r)=>s+(Number(r.premium)||0),0):div(v.premium))}원</div>
      <div class="pay-sb">${v.cnt.toLocaleString()}건</div>
    </div>`).join('');
}

loadData();
</script>
