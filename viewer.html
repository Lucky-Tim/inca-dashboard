<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인카금융 해빙총괄 | 경영현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#050d1a;color:#e2e8f0;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:48px;}

/* ── 헤더 ── */
.hdr{background:linear-gradient(135deg,#0f172a,#1e1b4b);padding:14px 14px 10px;border-bottom:1px solid rgba(99,102,241,.25);position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-tx{font-size:13px;font-weight:800;color:#e2e8f0;line-height:1.25;}
.logo-sb{font-size:10px;color:#64748b;}
.ref-btn{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;}
.stamp{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;}
.stamp-lb{font-size:10px;color:#34d399;font-weight:700;}
.stamp-tm{font-size:10px;color:#94a3b8;}

/* ── 필터바 ── */
.filter-bar{background:#0a1628;border-bottom:1px solid #1e293b;padding:10px 14px;display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.f-wrap{display:flex;flex-direction:column;gap:3px;min-width:80px;}
.f-lb{font-size:9px;color:#475569;font-weight:700;white-space:nowrap;}
.f-sel{background:#0f172a;border:1px solid #1e293b;color:#cbd5e1;border-radius:7px;padding:5px 6px;font-size:10px;font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%;}
.f-sel:focus{outline:none;border-color:#6366f1;}

/* ── 섹션 ── */
.sec{padding:12px 14px 0;}
.sec-ttl{font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.sec-ttl::before{content:'';display:inline-block;width:3px;height:12px;border-radius:2px;background:var(--ac,#6366f1);}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kc{background:linear-gradient(135deg,rgba(15,23,42,.9),rgba(30,27,75,.5));border-radius:13px;padding:13px 11px;border:1px solid rgba(99,102,241,.1);position:relative;overflow:hidden;}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,linear-gradient(90deg,#6366f1,#8b5cf6));}
.kc-ic{font-size:15px;margin-bottom:5px;}
.kc-lb{font-size:9px;color:#64748b;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em;}
.kc-vl{font-size:19px;font-weight:900;color:var(--cl,#818cf8);line-height:1.1;font-variant-numeric:tabular-nums;}
.kc-sb{font-size:9px;color:#475569;margin-top:3px;}
.kc.wide{grid-column:1/-1;}
.rate-bg{background:rgba(255,255,255,.06);border-radius:99px;height:6px;margin:7px 0 4px;}
.rate-fg{height:6px;border-radius:99px;background:linear-gradient(90deg,#22c55e,#4ade80);transition:width .7s ease;}
.kc-cmp{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;}
.kc-avg-lbl{color:#64748b;}
.kc-up{color:#4ade80;font-weight:800;}
.kc-dn{color:#f87171;font-weight:800;}

/* ── 차트 ── */
.chart-box{background:rgba(15,23,42,.7);border:1px solid rgba(51,65,85,.5);border-radius:13px;padding:13px;}
.chart-box canvas{max-height:220px;}

/* ── 본부 테이블 ── */
.tbl-wrap{background:rgba(15,23,42,.7);border:1px solid rgba(51,65,85,.5);border-radius:13px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead tr{background:#0f172a;border-bottom:1px solid #1e293b;}
th{padding:7px 7px;text-align:right;color:#64748b;font-weight:700;white-space:nowrap;font-size:10px;}
th:first-child{text-align:left;padding-left:10px;}
tbody tr{border-bottom:1px solid rgba(30,41,59,.8);}
td{padding:7px 7px;text-align:right;color:#cbd5e1;font-size:11px;}
td:first-child{text-align:left;font-weight:700;color:#e2e8f0;padding-left:10px;}
.badge{display:inline-block;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:800;}
.bg{background:rgba(34,197,94,.15);color:#4ade80;}
.by{background:rgba(234,179,8,.15);color:#fbbf24;}
.br{background:rgba(239,68,68,.15);color:#f87171;}

/* ── TOP 10 ── */
.top-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1e293b;}
.top-item:last-child{border-bottom:none;}
.top-rank{font-size:15px;min-width:28px;text-align:center;font-weight:800;color:#64748b;}
.top-info{flex:1;}
.top-name{font-size:13px;font-weight:700;color:#e2e8f0;}
.top-branch{font-size:10px;color:#64748b;margin-top:1px;}
.top-val{font-size:13px;font-weight:800;color:#60a5fa;font-family:monospace;}
.top-note{font-size:9px;color:#475569;margin-top:3px;text-align:right;}

/* ── 로딩/에러 ── */
.ctr{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
.spin{width:36px;height:36px;border:3px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.ld-tx{font-size:13px;color:#64748b;}
.err-bx{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:13px;padding:18px;text-align:center;font-size:13px;color:#f87171;line-height:1.6;max-width:300px;}

/* ── 푸터 ── */
.footer{margin:18px 14px 0;padding:10px;background:rgba(15,23,42,.5);border-radius:9px;text-align:center;font-size:9px;color:#334155;line-height:1.8;}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-ic">🏢</div>
      <div>
        <div class="logo-tx">인카금융 해빙총괄</div>
        <div class="logo-sb">조직 운영 경영현황</div>
      </div>
    </div>
    <button class="ref-btn" onclick="loadData()">🔄 갱신</button>
  </div>
  <div class="stamp">
    <span class="stamp-lb">📌 마감 기준</span>
    <span class="stamp-tm" id="stamp-time">불러오는 중...</span>
  </div>
</div>

<!-- 필터바: 소속본부 + 납입방법 -->
<div class="filter-bar" id="filter-bar" style="display:none;">
  <div class="f-wrap" style="min-width:96px;">
    <div class="f-lb">소속본부</div>
    <select class="f-sel" id="f-branch" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
  <div class="f-wrap" style="min-width:80px;">
    <div class="f-lb">납입방법</div>
    <select class="f-sel" id="f-paymethod" onchange="applyFilters()"><option value="all">전체</option></select>
  </div>
</div>

<!-- 메인 -->
<div id="main" style="display:none;">

  <!-- KPI 카드 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#6366f1;">핵심 KPI <span id="kpi-period" style="font-size:9px;color:#64748b;font-weight:400;margin-left:4px;"></span></div>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>

  <!-- 월별 실적 추이 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#8b5cf6;">월별 실적 추이 <span style="font-size:9px;color:#475569;font-weight:400;">(보라=월보험료 / 초록=인정실적)</span></div>
    <div class="chart-box">
      <canvas id="ch-trend"></canvas>
    </div>
  </div>

  <!-- 본부별 매트릭스 -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#10b981;">본부별 실적 매트릭스</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>본부</th>
          <th>월보험료</th>
          <th>가동률</th>
          <th>비중</th>
        </tr></thead>
        <tbody id="branch-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 설계사 TOP 10 (필터 무관 · 직전 6개월 월평균) -->
  <div class="sec" style="margin-top:12px;">
    <div class="sec-ttl" style="--ac:#f59e0b;">설계사 TOP 10 <span style="font-size:9px;color:#64748b;font-weight:400;margin-left:4px;" id="top10-period"></span></div>
    <div style="background:rgba(15,23,42,.7);border:1px solid rgba(51,65,85,.5);border-radius:13px;padding:13px;">
      <div id="top10"></div>
    </div>
  </div>

  <div class="footer">
    인카금융서비스 해빙총괄사업단<br>
    본 자료는 마감 시점 기준 확정 데이터입니다
  </div>
</div>

<div id="loading" class="ctr">
  <div class="spin"></div>
  <div class="ld-tx">데이터 불러오는 중...</div>
</div>
<div id="error" class="ctr" style="display:none;">
  <div class="err-bx" id="err-msg">오류가 발생했습니다</div>
  <button class="ref-btn" onclick="loadData()" style="margin-top:8px;">다시 시도</button>
</div>

<script>
const AS_URL = 'https://script.google.com/macros/s/AKfycbzTD7Ix4_YTZq_HNqGF0b2fhIt8f6TL3uqoSQiiudVopMoTA2rI66eoVKKtKbwwc3Ut/exec';

let RAW = { employees: [], aggregated: [], top10: [] };
let FILTERS = { branch: 'all', payMethod: 'all' };

// ── 포맷 ──
function fmtK(n) {
  n = Number(n) || 0;
  if (n >= 1e8) return (n / 1e8).toFixed(1) + '억';
  if (n >= 1e4) return Math.round(n / 1e4).toLocaleString() + '만';
  return Math.round(n).toLocaleString();
}
function fmtP(n) { return (Number(n) || 0).toFixed(1) + '%'; }
function mLabel(m) {
  m = String(m || '');
  if (m.length < 6) return m;
  return m.slice(0, 4) + '.' + m.slice(4, 6);
}

// ── 데이터 로드 ──
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('main').style.display    = 'none';
  document.getElementById('error').style.display   = 'none';
  document.getElementById('filter-bar').style.display = 'none';
  try {
    const res  = await fetch(AS_URL + '?t=' + Date.now());
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '마감 데이터 없음 — 관리자에게 문의하세요');
    if (!data.aggregated?.length) throw new Error('사전집계 데이터 없음 — 대시보드에서 클라우드 저장을 다시 실행해 주세요');

    RAW.employees  = data.employees  || [];
    RAW.aggregated = data.aggregated || [];
    RAW.top10      = data.top10      || [];

    const ts = data.lastUpdated
      ? new Date(data.lastUpdated).toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
      : '알 수 없음';
    document.getElementById('stamp-time').textContent = ts + ' 확정';

    initFilters();
    document.getElementById('loading').style.display     = 'none';
    document.getElementById('main').style.display        = 'block';
    document.getElementById('filter-bar').style.display  = 'flex';
    renderAll();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'flex';
    document.getElementById('err-msg').textContent   = '❌ ' + e.message;
  }
}

// ── 필터 초기화 ──
function initFilters() {
  const agg    = RAW.aggregated;
  const branches = [...new Set(agg.map(r => r.branch).filter(Boolean))].sort();
  const pays     = [...new Set(agg.map(r => r.payMethod).filter(Boolean))].sort();

  fillSelect('f-branch',   branches);
  fillSelect('f-paymethod', pays);

  // 기본값: 납입방법=월납
  if (pays.includes('월납')) {
    document.getElementById('f-paymethod').value = '월납';
    FILTERS.payMethod = '월납';
  }
}

function fillSelect(id, vals) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<option value="all">전체</option>' +
    vals.map(v => `<option value="${v}">${v}</option>`).join('');
  el.value = 'all';
}

// ── 필터 적용 ──
function applyFilters() {
  FILTERS.branch    = document.getElementById('f-branch').value;
  FILTERS.payMethod = document.getElementById('f-paymethod').value;
  renderAll();
}

// ── 필터된 aggregated (branch + payMethod) ──
function getAgg() {
  return RAW.aggregated.filter(r => {
    if (FILTERS.branch    !== 'all' && r.branch    !== FILTERS.branch)    return false;
    if (FILTERS.payMethod !== 'all' && r.payMethod !== FILTERS.payMethod) return false;
    return true;
  });
}

// ── 납입방법 필터 제외 (활동설계사·가동률 전용) ──
function getAggAllPay() {
  return RAW.aggregated.filter(r => {
    if (FILTERS.branch !== 'all' && r.branch !== FILTERS.branch) return false;
    return true; // payMethod 필터 제외
  });
}

// ── KPI 계산 ──
function calcKPIs() {
  const agg   = getAgg();
  const aggAP = getAggAllPay();

  // 현재 월 (YYYYMM)
  const now   = new Date();
  const currM = String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0');

  // 전체 월 목록
  const allMonths = [...new Set(RAW.aggregated.map(r => r.month).filter(Boolean))].sort();
  const latM      = allMonths[allMonths.length - 1] || '';

  // 마감 완료 월 (당월 제외)
  const closedMonths = allMonths.filter(m => m < currM);
  const closedSet    = new Set(closedMonths);
  const mc           = closedMonths.length || 1;

  // 등록 설계사 수 (재직, branch 필터 반영)
  const regEmps = (RAW.employees || []).filter(e => (e.type || '').replace(/\s/g, '') === '재직');
  const filteredEmps = FILTERS.branch === 'all'
    ? regEmps
    : regEmps.filter(e => (e.b2 || '').trim() === FILTERS.branch);
  const kpiE = filteredEmps.length || regEmps.length;

  // 당월 KPI
  const latAgg   = agg.filter(r => r.month === latM);
  const latAggAP = aggAP.filter(r => r.month === latM);
  const latA = latAgg.reduce((s, r) => s + r.premium, 0);
  const latC = latAgg.reduce((s, r) => s + r.count, 0);
  const latD = latAggAP.reduce((s, r) => s + r.activeAgents, 0); // 납입방법 무관
  const latF = kpiE > 0 ? latD / kpiE * 100 : 0;
  const latProd = latD > 0 ? latA / latD : 0;

  // 월평균 (마감 완료 월 기준)
  const closedAgg   = agg.filter(r => closedSet.has(r.month));
  const closedAggAP = aggAP.filter(r => closedSet.has(r.month));

  const avgA = closedAgg.reduce((s, r) => s + r.premium, 0) / mc;
  const avgC = closedAgg.reduce((s, r) => s + r.count, 0)   / mc;

  // 월별 활동설계사 평균 (납입방법 무관)
  const byMonth = {};
  closedAggAP.forEach(r => {
    byMonth[r.month] = (byMonth[r.month] || 0) + r.activeAgents;
  });
  const monthActVals = Object.values(byMonth);
  const avgD = monthActVals.length > 0
    ? monthActVals.reduce((a, b) => a + b, 0) / monthActVals.length
    : latD;
  const avgF    = kpiE > 0 ? avgD / kpiE * 100 : 0;
  const avgProd = avgD > 0 ? avgA / avgD : 0;

  return { latA, latC, latD, latE: kpiE, latF, latProd, avgA, avgC, avgD, avgF, avgProd, mc, latM, closedMonths, allMonths };
}

// ── 비교 태그 ──
function cmp(lat, avg, unit) {
  if (!avg) return '';
  const p  = avg > 0 ? (lat - avg) / avg * 100 : 0;
  let fa;
  if      (unit === 'pct')    fa = fmtP(avg);
  else if (unit === 'person') fa = Math.round(avg).toLocaleString() + '명';
  else if (unit === 'cnt')    fa = Math.round(avg).toLocaleString() + '건';
  else                         fa = fmtK(avg) + '원';
  return `<div class="kc-cmp">
    <span class="kc-avg-lbl">월평균 ${fa}</span>
    <span class="${p >= 0 ? 'kc-up' : 'kc-dn'}">${p >= 0 ? '+' : ''}${p.toFixed(1)}%</span>
  </div>`;
}

// ── 전체 렌더 ──
function renderAll() {
  const kpis = calcKPIs();
  renderKPICards(kpis);
  renderTrend(kpis);
  renderBranchTable(kpis);
  renderTop10();
}

// ── KPI 카드 ──
function renderKPICards(kpis) {
  const { latA, latC, latD, latE, latF, latProd, avgA, avgC, avgD, avgF, avgProd, mc, latM } = kpis;

  document.getElementById('kpi-period').textContent =
    latM ? `(${mLabel(latM)} vs 월평균 · ${mc}개월)` : '';

  const rc   = latF < 50 ? '#ef4444' : latF < 70 ? '#fbbf24' : '#4ade80';
  const defs = [
    {
      ic: '💰', lb: '당월 월보험료',
      vl: fmtK(latA) + '원',
      sb: mLabel(latM) + ' 확정',
      cm: cmp(latA, avgA, 'money'),
      cl: '#818cf8', ac: 'linear-gradient(90deg,#6366f1,#8b5cf6)'
    },
    {
      ic: '📋', lb: '당월 계약건수',
      vl: Math.round(latC).toLocaleString() + '건',
      sb: '중복제거 완료',
      cm: cmp(latC, avgC, 'cnt'),
      cl: '#22d3ee', ac: 'linear-gradient(90deg,#06b6d4,#0891b2)'
    },
    {
      ic: '📈', lb: '당월 생산성',
      vl: fmtK(latProd) + '원',
      sb: '활동설계사 1인당',
      cm: cmp(latProd, avgProd, 'money'),
      cl: '#34d399', ac: 'linear-gradient(90deg,#10b981,#059669)'
    },
    {
      ic: '🏃', lb: '당월 활동설계사',
      vl: latD + '명',
      sb: '납입방법 무관',
      cm: cmp(latD, avgD, 'person'),
      cl: '#4ade80', ac: 'linear-gradient(90deg,#22c55e,#16a34a)'
    },
    {
      ic: '👥', lb: '재직 설계사',
      vl: latE + '명',
      sb: '등록구분=재직',
      cm: '',
      cl: '#fbbf24', ac: 'linear-gradient(90deg,#f59e0b,#d97706)'
    },
    {
      ic: '⚡', lb: '당월 가동률',
      vl: fmtP(latF),
      sb: latD + '명 / ' + latE + '명',
      cm: cmp(latF, avgF, 'pct'),
      cl: rc, ac: `linear-gradient(90deg,${rc},${rc}88)`,
      wide: true, rate: latF
    },
  ];

  document.getElementById('kpi-grid').innerHTML = defs.map(k => `
    <div class="kc${k.wide ? ' wide' : ''}" style="--ac:${k.ac};--cl:${k.cl};">
      <div class="kc-ic">${k.ic}</div>
      <div class="kc-lb">${k.lb}</div>
      <div class="kc-vl">${k.vl}</div>
      ${k.rate != null ? `<div class="rate-bg"><div class="rate-fg" style="width:${Math.min(k.rate, 100)}%"></div></div>` : ''}
      <div class="kc-sb">${k.sb}</div>
      ${k.cm}
    </div>`).join('');
}

// ── 월별 트렌드 (Chart.js) ──
const _chartReg = {};
function renderTrend(kpis) {
  const agg = getAgg();
  const allMonths = kpis.allMonths.slice(-6); // 직전 6개월만 표시

  // 월별 premium + credit 합산
  const monthMap = {};
  agg.forEach(r => {
    if (!monthMap[r.month]) monthMap[r.month] = { premium: 0, credit: 0 };
    monthMap[r.month].premium += r.premium;
    monthMap[r.month].credit  += r.credit;
  });

  // 전년동월 (YYYYMM → -1년, branch 필터만 적용)
  const allAggMap = {};
  RAW.aggregated.filter(r => FILTERS.branch === 'all' || r.branch === FILTERS.branch)
    .forEach(r => { allAggMap[r.month] = (allAggMap[r.month] || 0) + r.premium; });
  const yoyData = allMonths.map(m => {
    const prevM = String(parseInt(m.slice(0, 4)) - 1) + m.slice(4, 6);
    return allAggMap[prevM] != null ? allAggMap[prevM] : null;
  });

  const labels   = allMonths.map(m => mLabel(m) + '월');
  const premData = allMonths.map(m => monthMap[m]?.premium || 0);
  const credData = allMonths.map(m => monthMap[m]?.credit  || 0);

  if (_chartReg['trend']) _chartReg['trend'].destroy();
  const ctx = document.getElementById('ch-trend');
  if (!ctx) return;
  _chartReg['trend'] = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        { type:'bar',  label:'월보험료',        data:premData,
          backgroundColor:'rgba(99,102,241,.5)', borderColor:'#6366f1', borderWidth:1, borderRadius:4 },
        { type:'bar',  label:'인정실적',         data:credData,
          backgroundColor:'rgba(16,185,129,.45)', borderColor:'#10b981', borderWidth:1, borderRadius:4 },
        { type:'line', label:'전년동월(월보험료)', data:yoyData,
          borderColor:'#f59e0b', borderWidth:2, borderDash:[6,4],
          pointRadius:4, pointBackgroundColor:'#f59e0b',
          fill:false, tension:0, spanGaps:true },
      ],
    },
    options: {
      responsive:true, maintainAspectRatio:true, animation:{duration:400},
      plugins:{
        legend:{display:true, labels:{color:'#94a3b8', font:{size:10}, boxWidth:14}},
        tooltip:{callbacks:{label: c => ' ' + fmtK(c.parsed.y) + '원'}},
      },
      scales:{
        x:{grid:{color:'#1e293b'}, ticks:{color:'#94a3b8', font:{size:9}}},
        y:{grid:{color:'#1e293b'}, ticks:{color:'#94a3b8', font:{size:9}, callback:v=>fmtK(v)}},
      },
    },
  });
}

// ── 본부별 매트릭스 ──
function renderBranchTable(kpis) {
  const agg   = getAgg();
  const aggAP = getAggAllPay();
  const { latM, mc } = kpis;

  // branch별 집계
  const bMap = {};
  agg.forEach(r => {
    const b = r.branch || '미분류';
    if (!bMap[b]) bMap[b] = { premium: 0, credit: 0 };
    bMap[b].premium += r.premium;
    bMap[b].credit  += r.credit;
  });

  // 당월 활동설계사 (납입방법 무관, branch별)
  const latActive = {};
  aggAP.filter(r => r.month === latM).forEach(r => {
    const b = r.branch || '미분류';
    latActive[b] = (latActive[b] || 0) + r.activeAgents;
  });

  // branch별 등록 설계사
  const regEmps = (RAW.employees || []).filter(e => (e.type || '').replace(/\s/g, '') === '재직');
  const branchReg = {};
  regEmps.forEach(e => {
    const b = (e.b2 || '').trim() || '미분류';
    branchReg[b] = (branchReg[b] || 0) + 1;
  });

  const totalPrem = Object.values(bMap).reduce((s, v) => s + v.premium, 0) || 1;

  const rows = Object.entries(bMap)
    .filter(([k]) => k && k !== '미분류')
    .map(([name, v]) => {
      const reg     = FILTERS.branch !== 'all' ? kpis.latE : (branchReg[name] || 0);
      const act     = latActive[name] || 0;
      const actRate = reg > 0 ? act / reg * 100 : 0;
      const share   = v.premium / totalPrem * 100;
      const avgCr   = v.credit / mc;
      return { name, premium: v.premium, actRate, share, avgCr };
    })
    .filter(b => b.premium > 0)
    .sort((a, b) => b.premium - a.premium);

  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('branch-tbody').innerHTML = rows.map((b, i) => `
    <tr>
      <td>${medals[i] || (i + 1)} ${b.name}</td>
      <td style="color:#60a5fa;font-family:monospace;">${fmtK(b.avgCr)}원<br>
        <span style="font-size:9px;color:#475569;">월평균</span></td>
      <td><span class="badge ${b.actRate < 50 ? 'br' : b.actRate < 70 ? 'by' : 'bg'}">${fmtP(b.actRate)}</span></td>
      <td style="color:#94a3b8">${fmtP(b.share)}</td>
    </tr>`).join('');
}

// ── TOP 10 (필터 무관, 사전집계 고정) ──
function renderTop10() {
  const top10 = RAW.top10 || [];
  const n     = top10[0]?.months || 6;
  document.getElementById('top10-period').textContent =
    `(직전 ${n}개월 월평균 · 필터 무관)`;

  if (!top10.length) {
    document.getElementById('top10').innerHTML =
      '<div style="color:#475569;text-align:center;padding:16px;font-size:12px;">데이터 없음</div>';
    return;
  }

  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('top10').innerHTML = top10.map((a, i) => `
    <div class="top-item">
      <div class="top-rank">${medals[i] || (i + 1) + '위'}</div>
      <div class="top-info">
        <div class="top-name">${a.name || '알 수 없음'}</div>
        <div class="top-branch">${a.branch || ''}</div>
      </div>
      <div>
        <div class="top-val">${fmtK(a.avgPremium)}원</div>
        <div class="top-note">월평균</div>
      </div>
    </div>`).join('');
}

loadData();
</script>
